<!DOCTYPE html>
<html data-theme="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>BookLoom — High-Fidelity Mockup</title>
    <style>
        /* ============================================================
   DESIGN TOKENS  (mirror JavaFX ".root" looked-up colors)
   Palette: Slate #b2babd · Sand Dollar #e7d6c0 · Cognac #a58075 · Charcoal #3a4a52
   ============================================================ */
        :root {
            --slate: #b2babd;
            --sand: #e7d6c0;
            --cognac: #a58075;
            --charcoal: #3a4a52;
            /* spacing (8px base) */
            --s1: 4px;
            --s2: 8px;
            --s3: 12px;
            --s4: 16px;
            --s5: 24px;
            --s6: 32px;
            --r-sm: 4px;
            --r: 6px;
            --r-lg: 9px;
            --r-pill: 999px;
            --fs-xs: 11px;
            --fs-sm: 12px;
            --fs-base: 13.5px;
            --fs-md: 15px;
            --fs-lg: 18px;
            --fs-xl: 22px;
            --fs-2xl: 28px;
        }

        :root[data-theme="light"] {
            --bg: #f4f1ea;
            --surface: #ffffff;
            --surface-2: #f6f1e8;
            --surface-alt: #fbf9f4;
            --border: #ddd5c8;
            --border-cool: #cdd2d3;
            --divider: #eae4d8;
            --text: #2c3941;
            --text-strong: #22303a;
            --muted: #6f7c82;
            --muted-2: #95928a;
            --primary: #a58075;
            --primary-hover: #916b60;
            --primary-press: #7e5b51;
            --primary-fg: #ffffff;
            --primary-soft: #f0e5dd;
            --sand-soft: #f2e9db;
            --sand-strong: #dcc4a3;
            --selected: #f0e6d6;
            --nav-bg: #3a4a52;
            --nav-bg-2: #324148;
            --nav-fg: #cdd5d8;
            --nav-fg-muted: #859399;
            --nav-active-bg: rgba(231, 214, 192, .13);
            --nav-active-fg: #f3ede3;
            --nav-accent: #c99a86;
            --title-bg: #324148;
            --title-fg: #dfe4e6;
            --ok: #5f8a6b;
            --ok-bg: #e7efe8;
            --ok-bd: #bcd4c1;
            --warn: #bd863a;
            --warn-bg: #f6ecd8;
            --warn-bd: #e4cfa2;
            --err: #b0574c;
            --err-bg: #f7e4df;
            --err-bd: #e4b6ad;
            --info: #4d6b78;
            --info-bg: #e5edf0;
            --info-bd: #b7cbd2;
            --shadow-sm: 0 1px 2px rgba(58, 74, 82, .10);
            --shadow: 0 3px 10px rgba(58, 74, 82, .12);
            --shadow-lg: 0 12px 34px rgba(35, 45, 50, .22);
            --focus: #a58075;
        }

        :root[data-theme="dark"] {
            --bg: #283237;
            --surface: #33424a;
            --surface-2: #2e3b41;
            --surface-alt: #38474f;
            --border: #48585f;
            --border-cool: #48585f;
            --divider: #3c4a51;
            --text: #e6ebed;
            --text-strong: #f4f7f8;
            --muted: #9fb0b7;
            --muted-2: #7f9098;
            --primary: #c4917e;
            --primary-hover: #d4a593;
            --primary-press: #b47e6b;
            --primary-fg: #241c19;
            --primary-soft: #3f3733;
            --sand-soft: #3a3a37;
            --sand-strong: #6d5f4a;
            --selected: rgba(231, 214, 192, .12);
            --nav-bg: #20292e;
            --nav-bg-2: #1c2429;
            --nav-fg: #cdd6da;
            --nav-fg-muted: #7d8f97;
            --nav-active-bg: rgba(231, 214, 192, .10);
            --nav-active-fg: #f3ede3;
            --nav-accent: #c99a86;
            --title-bg: #1c2429;
            --title-fg: #dfe4e6;
            --ok: #7faa8a;
            --ok-bg: #2b3a33;
            --ok-bd: #3f5a49;
            --warn: #d0a25a;
            --warn-bg: #3a3327;
            --warn-bd: #5c4d31;
            --err: #cc7a6f;
            --err-bg: #3b2b28;
            --err-bd: #5e3f39;
            --info: #7a9dab;
            --info-bg: #293940;
            --info-bd: #3d525b;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, .3);
            --shadow: 0 4px 14px rgba(0, 0, 0, .35);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, .5);
            --focus: #c4917e;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: var(--fs-base);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4 {
            margin: 0;
            color: var(--text-strong);
            font-weight: 600;
        }

        .muted {
            color: var(--muted);
        }

        .mono {
            font-family: ui-monospace, Menlo, Consolas, monospace;
        }

        /* ============================================================ WINDOW FRAME */
        .window {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .titlebar {
            height: 38px;
            flex: none;
            background: var(--title-bg);
            color: var(--title-fg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            user-select: none;
        }

        .titlebar .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .traffic {
            display: flex;
            gap: 7px;
        }

        .traffic i {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: block;
        }

        .traffic .r {
            background: #e06c60;
        }

        .traffic .y {
            background: #e6b04b;
        }

        .traffic .g {
            background: #68b05a;
        }

        .titlebar .app {
            font-weight: 600;
            font-size: 12.5px;
            letter-spacing: .2px;
        }

        .titlebar .right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tbtn {
            background: transparent;
            border: none;
            color: var(--title-fg);
            opacity: .8;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tbtn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, .08);
        }

        .body {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        /* ============================================================ SIDEBAR NAV */
        .sidebar {
            width: 236px;
            flex: none;
            background: var(--nav-bg);
            color: var(--nav-fg);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .nav-brand {
            padding: 14px 16px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-brand .logo {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            background: var(--cognac);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 13px;
        }

        .nav-brand .t {
            font-weight: 600;
            color: var(--nav-active-fg);
            font-size: 13.5px;
        }

        .nav-brand .s {
            font-size: 10.5px;
            color: var(--nav-fg-muted);
        }

        .nav-group {
            padding: 8px 10px 2px;
        }

        .nav-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .9px;
            color: var(--nav-fg-muted);
            padding: 6px 8px 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 7px;
            cursor: pointer;
            color: var(--nav-fg);
            border-left: 3px solid transparent;
            margin: 1px 0;
            font-size: 13px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, .05);
        }

        .nav-item.active {
            background: var(--nav-active-bg);
            color: var(--nav-active-fg);
            border-left-color: var(--nav-accent);
            font-weight: 600;
        }

        .nav-item .ico {
            width: 16px;
            text-align: center;
            opacity: .85;
        }

        .nav-item .step {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, .09);
            color: var(--nav-fg-muted);
        }

        .nav-item.active .step {
            background: var(--nav-accent);
            color: #2a211d;
            font-weight: 700;
        }

        .nav-item.done .step {
            background: var(--ok);
            color: #fff;
        }

        .nav-spacer {
            flex: 1;
        }

        .nav-foot {
            padding: 10px 14px;
            border-top: 1px solid rgba(255, 255, 255, .07);
            font-size: 11px;
            color: var(--nav-fg-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot-ok {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--ok);
            display: inline-block;
        }

        /* ============================================================ MAIN */
        .main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            height: 46px;
            flex: none;
            border-bottom: 1px solid var(--divider);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .crumbs {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12.5px;
            color: var(--muted);
        }

        .crumbs b {
            color: var(--text-strong);
            font-weight: 600;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 22px 26px 40px;
        }

        .page-h {
            margin-bottom: 4px;
            font-size: var(--fs-xl);
        }

        .page-sub {
            color: var(--muted);
            margin: 0 0 18px;
            font-size: 13px;
            max-width: 760px;
        }

        /* ============================================================ LAYOUT HELPERS */
        .row {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }

        .col {
            flex: 1;
            min-width: 250px;
        }

        .grid2 {
            display: grid;
            grid-template-columns:1fr 1fr;
            gap: 14px;
        }

        .stack > * + * {
            margin-top: 14px;
        }

        .between {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .gap8 {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .mt2 {
            margin-top: 8px;
        }

        .mt3 {
            margin-top: 12px;
        }

        .mt4 {
            margin-top: 16px;
        }

        /* ============================================================ CARD */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            box-shadow: var(--shadow-sm);
        }

        .card.pad {
            padding: 16px 18px;
        }

        .card-h {
            padding: 12px 16px;
            border-bottom: 1px solid var(--divider);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-h h3 {
            font-size: 13.5px;
        }

        .card-b {
            padding: 16px;
        }

        .card.warm {
            background: var(--surface-2);
        }

        /* ============================================================ BUTTONS  (JavaFX Button + styleClass) */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            line-height: 1;
            padding: 8px 15px;
            border-radius: var(--r);
            border: 1px solid transparent;
            cursor: pointer;
            white-space: nowrap;
            transition: background .12s, border-color .12s;
        }

        .btn:focus-visible {
            outline: 2px solid var(--focus);
            outline-offset: 2px;
        }

        .btn .ico {
            font-size: 13px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--primary-fg);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-primary:active {
            background: var(--primary-press);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-strong);
            border-color: var(--border);
        }

        .btn-secondary:hover {
            background: var(--surface-2);
            border-color: var(--slate);
        }

        .btn-ghost {
            background: transparent;
            color: var(--muted);
        }

        .btn-ghost:hover {
            background: var(--surface-2);
            color: var(--text-strong);
        }

        .btn-danger {
            background: var(--err);
            color: #fff;
        }

        .btn-danger:hover {
            filter: brightness(.94);
        }

        .btn-danger-outline {
            background: transparent;
            color: var(--err);
            border-color: var(--err-bd);
        }

        .btn-danger-outline:hover {
            background: var(--err-bg);
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }

        .btn-lg {
            padding: 11px 20px;
            font-size: 14px;
        }

        .btn-icon {
            padding: 7px;
            width: 33px;
            height: 33px;
            justify-content: center;
        }

        .btn[disabled] {
            opacity: .45;
            cursor: not-allowed;
        }

        .btn .spin {
            width: 13px;
            height: 13px;
            border: 2px solid rgba(255, 255, 255, .5);
            border-top-color: #fff;
            border-radius: 50%;
            animation: sp .7s linear infinite;
        }

        @keyframes sp {
            to {
                transform: rotate(360deg)
            }
        }

        /* ============================================================ INPUTS  (JavaFX TextField / TextArea / ComboBox) */
        label.fld {
            display: block;
            font-size: 11.5px;
            color: var(--muted);
            margin: 0 0 5px;
            font-weight: 500;
        }

        .input, select.input, textarea.input {
            width: 100%;
            font-family: inherit;
            font-size: 13px;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border-cool);
            border-radius: var(--r);
            padding: 8px 10px;
            transition: border-color .12s, box-shadow .12s;
        }

        .input:focus, select.input:focus, textarea.input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }

        textarea.input {
            resize: vertical;
            line-height: 1.55;
        }

        .input.err-field {
            border-color: var(--err);
            box-shadow: 0 0 0 3px var(--err-bg);
        }

        .field-err {
            color: var(--err);
            font-size: 11px;
            margin-top: 4px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .field {
            margin-bottom: 14px;
        }

        .hint {
            font-size: 11px;
            color: var(--muted-2);
            margin-top: 5px;
        }

        .input-group {
            display: flex;
        }

        .input-group .input {
            border-radius: var(--r) 0 0 var(--r);
        }

        .input-group .btn {
            border-radius: 0 var(--r) var(--r) 0;
            border: 1px solid var(--border);
            border-left: none;
        }

        /* ============================================================ SEGMENTED  (JavaFX SegmentedButton / ToggleGroup) */
        .seg {
            display: inline-flex;
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            background: var(--surface);
        }

        .seg span {
            padding: 7px 13px;
            font-size: 12.5px;
            cursor: pointer;
            border-right: 1px solid var(--border);
            color: var(--muted);
            user-select: none;
        }

        .seg span:last-child {
            border-right: none;
        }

        .seg span.on {
            background: var(--primary);
            color: #fff;
            font-weight: 500;
        }

        .seg.warm span.on {
            background: var(--sand-strong);
            color: #3a2f22;
        }

        /* ============================================================ TOGGLE SWITCH  (ControlsFX/AtlantaFX ToggleSwitch) */
        .switch {
            position: relative;
            width: 38px;
            height: 22px;
            border-radius: var(--r-pill);
            background: var(--slate);
            cursor: pointer;
            transition: background .15s;
            flex: none;
        }

        .switch::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            box-shadow: var(--shadow-sm);
            transition: left .15s;
        }

        .switch.on {
            background: var(--primary);
        }

        .switch.on::after {
            left: 18px;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 0;
        }

        .toggle-row .tx {
            flex: 1;
        }

        .toggle-row .tx small {
            display: block;
            color: var(--muted);
            font-size: 11.5px;
        }

        /* checkbox / radio (JavaFX CheckBox / RadioButton) */
        .chk {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 12.5px;
            padding: 5px 0;
            cursor: pointer;
        }

        .chk input {
            accent-color: var(--primary);
            width: 15px;
            height: 15px;
        }

        /* ============================================================ BADGES / PILLS  (styled Label) */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: var(--r-pill);
            border: 1px solid transparent;
        }

        .b-ok {
            background: var(--ok-bg);
            color: var(--ok);
            border-color: var(--ok-bd);
        }

        .b-warn {
            background: var(--warn-bg);
            color: var(--warn);
            border-color: var(--warn-bd);
        }

        .b-err {
            background: var(--err-bg);
            color: var(--err);
            border-color: var(--err-bd);
        }

        .b-info {
            background: var(--info-bg);
            color: var(--info);
            border-color: var(--info-bd);
        }

        .b-run {
            background: var(--info-bg);
            color: var(--info);
            border-color: var(--info-bd);
        }

        .b-neutral {
            background: var(--surface-2);
            color: var(--muted);
            border-color: var(--border);
        }

        .b-sand {
            background: var(--sand-soft);
            color: #8a6d4e;
            border-color: var(--sand-strong);
        }

        .b-dot::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            display: inline-block;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            background: var(--sand-soft);
            border: 1px solid var(--sand-strong);
            color: #7a6144;
            padding: 3px 6px 3px 10px;
            border-radius: var(--r-pill);
        }

        .chip .x {
            cursor: pointer;
            opacity: .6;
            border-radius: 50%;
            width: 15px;
            height: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chip .x:hover {
            opacity: 1;
            background: rgba(0, 0, 0, .08);
        }

        /* ============================================================ TABLE  (JavaFX TableView) */
        table.tbl {
            width: 100%;
            border-collapse: collapse;
            font-size: 12.5px;
        }

        table.tbl th {
            text-align: left;
            font-weight: 600;
            color: var(--muted);
            background: var(--surface-2);
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 11.5px;
        }

        table.tbl td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--divider);
            vertical-align: middle;
        }

        table.tbl tr:hover td {
            background: var(--surface-alt);
        }

        .row-selected td {
            background: var(--selected) !important;
        }

        .row-error td {
            box-shadow: inset 3px 0 0 var(--err);
        }

        .row-ok td {
            box-shadow: inset 3px 0 0 var(--ok);
        }

        /* list rows (JavaFX ListView cell) */
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 11px 14px;
            background: var(--surface);
            margin-bottom: 8px;
            cursor: pointer;
        }

        .list-item:hover {
            border-color: var(--slate);
            background: var(--surface-alt);
        }

        .list-item.sel {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-soft);
        }

        /* ============================================================ PROGRESS / SLIDER */
        .bar {
            height: 9px;
            border-radius: var(--r-pill);
            background: var(--surface-2);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .bar > span {
            display: block;
            height: 100%;
            background: var(--primary);
            border-radius: var(--r-pill);
        }

        .bar.indet > span {
            width: 35%;
            background: var(--info);
            animation: indet 1.4s ease-in-out infinite;
        }

        @keyframes indet {
            0% {
                margin-left: -35%
            }
            100% {
                margin-left: 100%
            }
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--primary);

            display: flex;
            gap: 2px;
            border-bottom: 1px solid var(--divider);
            margin-bottom: 16px;

            padding: 9px 15px;
            font-size: 13px;
            color: var(--muted);

            border-bottom: 2px solid transparent;

            color: var(--text-strong);

        .tab.on {
            color: var(--primary);
            border-bottom-color: var(--primary);
            font-weight: 600;
        }

        /* ============================================================ STAT / KPI */
        .stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stat {
            flex: 1;
            min-width: 120px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 14px 16px;
        }

        .stat .n {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-strong);
        }

        .stat .l {
            font-size: 11.5px;
            color: var(--muted);
            margin-top: 2px;
        }

        .stat.accent {
            background: var(--primary-soft);
            border-color: var(--sand-strong);
        }

        /* banners (JavaFX styled HBox) */
        .banner {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            border-radius: var(--r);
            padding: 11px 14px;
            font-size: 12.5px;
            border: 1px solid;
        }

        .banner .ico {
            font-size: 15px;
            line-height: 1.2;
        }

        .banner-warn {
            background: var(--warn-bg);
            border-color: var(--warn-bd);
            color: #7a5a20;
        }

        .banner-err {
            background: var(--err-bg);
            border-color: var(--err-bd);
            color: #7e3a32;
        }

        .banner-info {
            background: var(--info-bg);
            border-color: var(--info-bd);
            color: #33505c;
        }

        :root[data-theme=dark] .banner-warn {
            color: var(--warn);
        }

        :root[data-theme=dark] .banner-err {
            color: var(--err);
        }

        :root[data-theme=dark] .banner-info {
            color: var(--info);
        }

        /* compare panes (two JavaFX TextArea, scroll-synced) */
        .compare {
            display: flex;
            gap: 12px;
        }

        .pane {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: var(--r);
            background: var(--surface);
            min-height: 150px;
        }

        .pane .ph {
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: var(--muted);
            padding: 8px 12px;
            border-bottom: 1px solid var(--divider);
            display: flex;
            justify-content: space-between;
        }

        .pane .pb {
            padding: 12px;
            font-size: 13.5px;
            line-height: 1.6;
        }

        .pane.target .pb {
            background: var(--surface-alt);
        }

        /* log */
        .log {
            font-family: ui-monospace, Menlo, Consolas, monospace;
            font-size: 11.5px;
            background: #26313a;
            color: #cfd8dd;
            border-radius: var(--r);
            padding: 10px 12px;
            height: 168px;
            overflow: auto;
        }

        .log .g {
            color: #8fca9a;
        }

        .log .y {
            color: #e3c173;
        }

        .log .b {
            color: #87b6d6;
        }

        .log .r {
            color: #e0938a;
        }

        .log .m {
            color: #c8a6c0;
        }

        /* empty state */
        .empty {
            text-align: center;
            padding: 46px 20px;
            color: var(--muted);
        }

        .empty .ico {
            font-size: 34px;
            opacity: .5;
        }

        .empty h3 {
            margin: 12px 0 6px;
            color: var(--text-strong);
            font-size: 15px;
        }

        .empty p {
            max-width: 360px;
            margin: 0 auto 16px;
            font-size: 12.5px;
        }

        /* dropzone */
        .dropzone {
            border: 2px dashed var(--sand-strong);
            background: var(--sand-soft);
            border-radius: var(--r-lg);
            padding: 30px;
            text-align: center;
            color: #8a6d4e;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* cover placeholder */
        .cover {
            width: 90px;
            height: 132px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--sand-strong), var(--cognac));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
            flex: none;
            box-shadow: var(--shadow-sm);
            text-align: center;
            padding: 6px;
        }

        .kv {
            display: flex;
            gap: 10px;
            font-size: 12.5px;
            padding: 3px 0;
        }

        .kv .k {
            color: var(--muted);
            width: 150px;
            flex: none;
        }

        /* tree (JavaFX TreeView) */
        .tree {
            font-size: 12.5px;
        }

        .tree .node {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 5px 6px;
            border-radius: 5px;
            cursor: pointer;
        }

        .tree .node:hover {
            background: var(--surface-alt);
        }

        .tree .node.child {
            margin-left: 22px;
            color: var(--muted);
        }

        .tree .tw {
            color: var(--muted-2);
            width: 12px;
            display: inline-block;
        }

        /* ============================================================ DIALOG / MODAL  (JavaFX Dialog / Alert) */
        .scrim {
            position: fixed;
            inset: 0;
            background: rgba(30, 38, 42, .45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 20px;
        }

        .scrim.show {
            display: flex;
        }

        .dialog {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            box-shadow: var(--shadow-lg);
            width: 520px;
            max-width: 100%;
            max-height: 88vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .dialog.wide {
            width: 680px;
        }

        .dialog-h {
            padding: 15px 18px;
            border-bottom: 1px solid var(--divider);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dialog-h .di {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex: none;
        }

        .di.ok {
            background: var(--ok-bg);
            color: var(--ok);
        }

        .di.warn {
            background: var(--warn-bg);
            color: var(--warn);
        }

        .di.err {
            background: var(--err-bg);
            color: var(--err);
        }

        .di.info {
            background: var(--info-bg);
            color: var(--info);
        }

        .di.brand {
            background: var(--primary-soft);
            color: var(--primary);
        }

        .dialog-h h3 {
            font-size: 15px;
        }

        .dialog-h .sub {
            font-size: 11.5px;
            color: var(--muted);
        }

        .dialog-b {
            padding: 18px;
            overflow-y: auto;
        }

        .dialog-f {
            padding: 13px 18px;
            border-top: 1px solid var(--divider);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            background: var(--surface-alt);
        }

        /* ============================================================ TOASTS  (ControlsFX Notifications) */
        .toasts {
            position: fixed;
            top: 52px;
            right: 18px;
            z-index: 60;
            display: flex;
            flex-direction: column;
            gap: 9px;
            width: 340px;
        }

        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left-width: 4px;
            border-radius: var(--r);
            box-shadow: var(--shadow);
            padding: 11px 13px;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            animation: tin .2s ease;
        }

        @keyframes tin {
            from {
                opacity: 0;
                transform: translateX(12px)
            }
            to {
                opacity: 1;
                transform: none
            }
        }

        .toast .ti {
            font-size: 16px;
            line-height: 1.2;
        }

        .toast .tb {
            flex: 1;
        }

        .toast .tt {
            font-weight: 600;
            font-size: 12.5px;
            color: var(--text-strong);
        }

        .toast .td {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }

        .toast .tx {
            cursor: pointer;
            color: var(--muted-2);
        }

        .toast.ok {
            border-left-color: var(--ok);
        }

        .toast.warn {
            border-left-color: var(--warn);
        }

        .toast.err {
            border-left-color: var(--err);
        }

        .toast.info {
            border-left-color: var(--info);
        }

        /* misc */
        .divider {
            height: 1px;
            background: var(--divider);
            margin: 16px 0;
        }

        .swatches {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .sw {
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            width: 130px;
        }

        .sw .c {
            height: 56px;
        }

        .sw .m {
            padding: 7px 9px;
            font-size: 11px;
        }

        .sw .m b {
            display: block;
            color: var(--text-strong);
        }

        .tag-note {
            font-size: 11px;
            color: var(--muted);
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 2px 7px;
            display: inline-block;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: var(--muted-2);
            margin: 26px 0 10px;
            font-weight: 700;
        }

        .tooltip-demo {
            position: relative;
            display: inline-block;
        }

        .tt-bub {
            background: var(--charcoal);
            color: #fff;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 5px;
            display: inline-block;
        }

        .step-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 26px;
            border-top: 1px solid var(--divider);
            padding-top: 16px;
        }
    </style>
</head>

    }

    function buildNav() {
        document.getElementById('navWorkflow').innerHTML = WORKFLOW.map(n => navItem(n)).join('');
        document.getElementById('navApp').innerHTML = APPNAV.map(n => navItem(n)).join('');
        document.getElementById('navRef').innerHTML = REF.map(n => navItem(n)).join('');
    }

    function navItem(n) {
        const left = n.step ? `<span class="step">${n.step}</span>` : `<span class="ico">${n.ico || '•'}</span>`;
        const done = DONE.has(n.id) ? 'done' : '';
        return `<div class="nav-item ${done}" data-id="${n.id}" onclick="go('${n.id}')">${left}<span>${n.t}</span></div>`;
    }

    function go(id) {
        document.querySelectorAll('.nav-item').forEach(e => e.classList.toggle('active', e.dataset.id === id));
        const meta = [...WORKFLOW, ...APPNAV, ...REF].find(x => x.id === id) || {t: id};
        const idx = ORDER.indexOf(id);
        const crumbRoot = WORKFLOW.some(x => x.id === id) ? 'Workflow' : (APPNAV.some(x => x.id === id) ? 'Application' : 'Design reference');
        document.getElementById('crumbs').innerHTML = `${crumbRoot} <span style="opacity:.5">/</span> <b>${meta.t}</b>${idx >= 0 ? ` <span class="muted">· step ${idx + 1} of ${ORDER.length}</span>` : ''}`;
        const html = (S[id] || (() => '<div class="empty">…</div>'))();
        const nav = (idx >= 0) ? `<div class="step-actions" style="border:none;padding-top:8px">
      <button class="btn btn-ghost" ${idx <= 0 ? 'disabled' : ''} onclick="${idx > 0 ? `go('${ORDER[idx - 1]}')` : ''}">‹ Back</button>
      <button class="btn btn-secondary" ${idx >= ORDER.length - 1 ? 'disabled' : ''} onclick="${idx < ORDER.length - 1 ? `go('${ORDER[idx + 1]}')` : ''}">Next ›</button></div>` : '';
        // brief/structure/glossary/import already include their own step actions
        const skipNav = ['brief', 'structure', 'glossary', 'import'].includes(id);
        document.getElementById('content').innerHTML = html + (skipNav ? '' : nav);
        // toolbar contextual actions
        const ta = document.getElementById('toolbarActions');
        if (id === 'translating') ta.innerHTML = `<button class="btn btn-ghost btn-sm">⏸ Pause</button><button class="btn btn-secondary btn-sm" onclick="go('review')">Review (3)</button>`;
        else if (id === 'projects') ta.innerHTML = `<button class="btn btn-primary btn-sm" onclick="go('import')">＋ New</button>`;
        else ta.innerHTML = '';
        document.getElementById('content').scrollTop = 0;
    }

    function setState(group, val) {
        stateStore[group] = val;
        document.querySelectorAll(`.seg[data-state="${group}"] span`).forEach((s, i) => {
        });
        event.target.closest('.seg').querySelectorAll('span').forEach(s => s.classList.remove('on'));
        event.target.classList.add('on');
        if (group === 'import') document.getElementById('importState').innerHTML = importState[val];
        if (group === 'run') document.getElementById('runState').innerHTML = runState[val];
    }

    function setTab(group, val) {
        tabStore[group] = val;
        event.target.closest('.tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
        event.target.classList.add('on');
        if (group === 'settings') document.getElementById('settingsTab').innerHTML = settingsTab[val];
    }

    /* dialogs */
    function openDialog(id) {
        document.getElementById('modalHost').innerHTML = DLG[id] || '';
        document.getElementById('scrim').classList.add('show');
    }

    function closeDialog() {
        document.getElementById('scrim').classList.remove('show');
        document.getElementById('modalHost').innerHTML = '';
    }

    /* toasts */
    function toast(type, title, desc) {
        const icons = {ok: '✓', info: 'ℹ', warn: '⚠', err: '⛔'};
        const el = document.createElement('div');
        el.className = 'toast ' + type;
        el.innerHTML = `<div class="ti">${icons[type]}</div><div class="tb"><div class="tt">${title}</div><div class="td">${desc || ''}</div></div><div class="tx" onclick="this.parentNode.remove()">✕</div>`;
        document.getElementById('toasts').appendChild(el);
        setTimeout(() => el.remove(), 5200);
    }

    /* theme */
    function toggleTheme() {
        const r = document.documentElement;
        const d = r.getAttribute('data-theme') === 'dark';
        setTheme(d ? 'light' : 'dark');
    }

    function setTheme(t) {
        document.documentElement.setAttribute('data-theme', t);
        document.getElementById('themeBtn').textContent = (t === 'dark' ? '◑ Light' : '◐ Dark');
    }

    /* segmented toggles (visual) + chip removal + delegated dialog buttons */
    document.addEventListener('click', e => {
        const segSpan = e.target.closest('.seg span');
        if (segSpan && !segSpan.getAttribute('onclick')) {
            segSpan.closest('.seg').querySelectorAll('span').forEach(s => s.classList.remove('on'));
            segSpan.classList.add('on');
        }
        const sw = e.target.closest('.switch');
        if (sw) sw.classList.toggle('on');
        const chipx = e.target.closest('.chip .x');
        if (chipx) chipx.closest('.chip').remove();
        const db = e.target.closest('[data-dialog]');
        if (db) {
            openDialog(db.getAttribute('data-dialog'));
        }
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeDialog();
    });

    buildNav();
    go('projects');
</script>
</body>
</html>
